<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- IMPORTANT Google material icon's names need to be in alphabetical order -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add_2,apparel,arrow_left,arrow_right,beach_access,business_center,child_care,close,construction,credit_score,desktop_windows,directions_car,edit_note,exercise,featured_seasonal_and_gifts,finance,home,local_cafe,local_gas_station,logout,manage_accounts,manufacturing,menu,pet_supplies,pets,potted_plant,remove,school,shopping_cart,spa,sports_tennis,stadia_controller,stethoscope,subscriptions,theater_comedy,toys_fan,travel,view_array,view_carousel,view_cozy,wb_sunny"
    />
    <link rel="stylesheet" href="./src/style.css" />
    <title>Budget App</title>
  </head>
  <body class="site-wrapper">
    <!-- left nav bar -->
    <nav id="sidebar" class="sidebar hidden">
      <button id="x-icon" class="material-symbols-outlined x-icon">close</button>
      <img src="/assets/budget-logo.png" alt="logo" class="logo" />
      <ul>
        <li>
          <a href="/" class="menu-link">
            <i class="material-symbols-outlined">finance</i>
            Budget
          </a>
        </li>
        <li>
          <a href="#" class="menu-link settings"
            ><i class="material-symbols-outlined">manage_accounts</i>
            Accounts
          </a>
        </li>
      </ul>
      <button id="logOut" class="log-out">
        <i class="material-symbols-outlined">logout</i>
        Log Out
      </button>
    </nav>
    <!-- top nav bar -->
    <div class="site-content-wrapper">
      <header id="site-header" class="site-header" role="banner">
        <div class="nav-list-top">
          <button id="menuBtn" class="material-symbols-outlined menu-icon">menu</button>
          <h1 class="brand-name">Budgeting</h1>
        </div>
      </header>
      <!-- main content -->
      <main id="mainContent" class="main-content">
        <section class="category-icon-container">
          <div id="gearSettingIcon" class="gear-setting-wrapper"></div>
          <button id="slideLeft" class="material-symbols-outlined slide-left-btn">
            arrow_left
          </button>
          <ul id="trackIcons" class="track-icons"></ul>
          <button id="slideRight" class="material-symbols-outlined slide-right-btn">
            arrow_right
          </button>
        </section>

        <div class="util-btn-wrapper">
          <button class="util-btns">Multiselect</button>
          <button id="addBudget" class="util-btns">+ Add Budget</button>
        </div>

        <section class="category-details">
          <div class="category-detail-wrapper">
            <h2 id="category-title" class="category-title"></h2>
            <div id="expense-list"></div>
          </div>
        </section>
      </main>
      <footer id="site-footer"></footer>

      <dialog id="categoryDialogWrapper" class="category-dialog-wrapper">
        <div id="categoryDialog" class="category-dialog">
          <button
            title="close"
            onClick="categoryDialogWrapper.close()"
            class="material-symbols-outlined close-btn"
          >
            close
          </button>
          <ul id="categoryIcons" class="category-modal-icons"></ul>
          <button onClick="categoryDialogWrapper.close()" class="save-btn">Save</button>
        </div>
      </dialog>

      <dialog id="confirmationDialog" class="confirmation-dialog-wrapper">
        <div id="confirmation" class="confirmation-dialog">
          <p>Remove Category?</p>
          <button id="deleteCatIconBtn" class="deleteCatIconBtn">Delete</button>
          <button id="cancelCatIconBtn" class="cancelCatIconBtn">Cancel</button>
        </div>
      </dialog>

      <dialog id="addCategoryBudget" class="add-category-wrapper">
        <div id="category" class="add-category-dialog">
          <p>Add New Category</p>
          <button id="addCategoryBtn" class="add-category-btn">Add</button>
          <button id="cancelAddCategory" class="cancel-add-category">Cancel</button>
        </div>
      </dialog>

      <dialog id="editBudgetDialog" class="edit-budget-dialog-wrapper"></dialog>
    </div>
    <script src="/src/index.js" type="module"></script>
  </body>
</html>
