<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <!-- Google material icon's name need to be in alphabetical order -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=
      apparel,
      beach_access,
      business_center,
      child_care
      construction,
      credit_score,
      desktop_windows,
      directions_car,
      exercise,
      featured_seasonal_and_gifts,
      home,
      local_cafe,
      local_gas_station,
      manufacturing,
      pet_supplies,
      pets,
      potted_plant,
      school,
      shopping_cart,
      spa,
      sports_tennis,
      stadia_controller,
      stethoscope,
      subscriptions,
      theater_comedy,
      toys_fan,
      travel"
    />
    <link rel="stylesheet" href="./src/style.css" />
    <title>Budget App</title>
  </head>
  <body>
    <!-- top nav bar -->
    <h1>Budget App</h1>
    <header id="site-header"></header>
    <!-- left nav bar -->
    <nav>
      <img src="/assets/logo.svg" alt="logo" class="logo" />
      <ul>
        <li class="nav-list-side">Budget</li>
        <li class="nav-list-side">Expenses</li>
        <li class="nav-list-side">Income</li>
        <li class="nav-list-side">Receipts</li>
        <li class="nav-list-side">Settings</li>
      </ul>
    </nav>
    <main>
      <!--unused id category-section, site-footer-->
      <section id="category-section">
        <button id="gear-icon"></button>
        <div id="category-icon-container"></div>
      </section>
      <section id="category-details">
        <h2 id="category-title"></h2>
        <div id="expense-list"></div>
      </section>
    </main>
    <footer id="site-footer"></footer>
    <script src="/src/index.js" type="module"></script>
  </body>
</html>
